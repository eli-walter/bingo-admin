# File: .github/workflows/build-android.yml
# Manually triggered workflow to build a debug Android APK for Manuia Finance.
# Trigger via: GitHub → Actions → "Build Android APK" → Run workflow

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes (optional)'
        required: false
        default: 'Manual debug build'

jobs:
  build-android:
    name: Build Manuia Finance APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Java (required by Gradle) ───────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install all Node dependencies ───────────────────────────────────
      - name: Install Node dependencies
        run: npm install

      # ── 5. Build the React web app ─────────────────────────────────────────
      - name: Build React web app
        run: npm run build

      # ── 6. Add Android platform if not yet committed ───────────────────────
      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "📱 Android folder not found — running: npx cap add android"
            npx cap add android
          else
            echo "✅ Android platform folder already present"
          fi

      # ── 7. Pre-process icon so logo fills 95% of the icon frame ─────────────
      # Android adaptive icons have a safe zone (inner 66dp of 108dp canvas).
      # We pre-scale the source PNG so the logo fills exactly 95% of the canvas,
      # giving it maximum visual presence inside any launcher icon shape.
      - name: Install ImageMagick and pre-process icon (95% fill)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick bc

          CANVAS=1024
          # 95% of canvas = logo occupies 972px, leaving 26px total (13px each side)
          LOGO_SIZE=$(echo "$CANVAS * 95 / 100" | bc)

          echo "🎨 Pre-processing icon: logo ${LOGO_SIZE}×${LOGO_SIZE}px on ${CANVAS}×${CANVAS}px canvas (95% fill)"

          convert assets/icon.png \
            -resize ${LOGO_SIZE}x${LOGO_SIZE} \
            -gravity center \
            -background none \
            -extent ${CANVAS}x${CANVAS} \
            assets/icon.png

          echo "✅ Icon pre-processed — logo now fills 95% of frame"

      # ── 8. Generate icons + splash via @capacitor/assets (official tool) ───
      # Reads the pre-processed assets/icon.png (logo at 95% fill) and produces
      # all mipmap densities, adaptive icons, and splash screens.
      - name: Install @capacitor/assets
        run: npm install -D @capacitor/assets

      - name: Generate all icons and splash screens
        run: |
          npx @capacitor/assets generate \
            --android \
            --iconBackgroundColor "#F0F4F8" \
            --iconBackgroundColorDark "#F0F4F8" \
            --splashBackgroundColor "#F0F4F8" \
            --splashBackgroundColorDark "#F0F4F8"
          echo "✅ Icons and splash generated via @capacitor/assets"

      # ── 9. Remove duplicate ic_launcher_background resource ───────────────
      # Capacitor scaffolds ic_launcher_background.xml; @capacitor/assets also
      # writes to colors.xml — remove the standalone file to avoid Gradle conflict.
      - name: Remove duplicate ic_launcher_background resource
        run: |
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          echo "✅ Duplicate resource removed"

      # ── 10. Accept Android SDK licences ────────────────────────────────────
      - name: Accept Android SDK licences
        run: |
          SDK_MANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDK_MANAGER" ]; then
            yes | "$SDK_MANAGER" --licenses 2>/dev/null || true
          else
            echo "sdkmanager not found at expected path — licences may already be accepted"
          fi

      # ── 11. Sync Capacitor → Android ───────────────────────────────────────
      - name: Sync Capacitor to Android
        run: npx cap sync android

      # ── 12. Build debug APK ────────────────────────────────────────────────
      - name: Write android/local.properties (point Gradle to correct SDK)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK with Gradle
        working-directory: android
        run: |
          unset ANDROID_SDK_ROOT
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 13. Rename & upload ────────────────────────────────────────────────
      - name: Rename APK to manuia-finance.apk
        run: |
          APK=$(find android -name "app-debug.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found. Listing build outputs:" && find android -name "*.apk"
            exit 1
          fi
          cp "$APK" manuia-finance.apk
          echo "✅ APK saved as manuia-finance.apk ($(du -sh manuia-finance.apk | cut -f1))"

      - name: Upload manuia-finance.apk as artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuia-finance
          path: manuia-finance.apk
          retention-days: 30
